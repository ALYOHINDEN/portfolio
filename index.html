<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta id="meta-description" name="description" content="">
  <title>Денис Алёхин — бизнес-аналитик</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Onest:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sections.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/print.css" media="print">
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Основная навигация">
      <a data-i18n="nav.about" href="#about"></a>
      <a data-i18n="nav.workflow" href="#workflow"></a>
      <a data-i18n="nav.experience" href="#experience"></a>
      <a data-i18n="nav.skills" href="#skills"></a>
      <a data-i18n="nav.projects" href="#projects"></a>
      <a data-i18n="nav.contact" href="#contact"></a>
    </nav>

    <div class="header-tools">
      <div class="language-switcher" aria-label="Language">
        <button class="language-button is-active" type="button" data-language="ru">RU</button>
        <span aria-hidden="true">|</span>
        <button class="language-button" type="button" data-language="en">EN</button>
      </div>

      <button class="theme-toggle" id="theme-toggle" type="button">
        <span class="theme-toggle__icon" aria-hidden="true">☀</span>
      </button>
    </div>
  </header>

  <main id="top">
    <section class="hero section">
      <div class="container hero__grid">
        <div class="hero__content">
          <div class="availability-status" aria-live="polite">
            <span class="availability-status__main" id="availability"></span>
            <span class="availability-status__meta" id="availability-meta"></span>
          </div>

          <div class="hero__main">
            <h1 id="profile-name"></h1>
            <p class="hero__title" id="profile-title"></p>
            <p class="hero__lead" id="profile-subtitle"></p>

            <div class="hero__actions">
              <a class="button button--primary" data-i18n="heroPrimary" href="#contact"></a>
              <a class="button button--secondary" data-i18n="heroSecondary" href="#projects"></a>
            </div>
          </div>

          <section class="experience-summary" aria-labelledby="profile-experience">
            <h2 class="experience-summary__title" id="profile-experience"></h2>
            <div class="domain-list" id="domain-list"></div>
          </section>
        </div>

        <aside class="profile-card">
          <div class="profile-card__photo-wrap">
            <img class="profile-card__photo" id="profile-photo" src="assets/images/avatar-placeholder.svg" alt="">
          </div>

          <div class="profile-card__body">
            <span class="profile-card__label" data-i18n="profileFocus"></span>
            <ul class="focus-list" id="focus-list"></ul>
          </div>
        </aside>
      </div>
    </section>

    <section class="section" id="about">
      <div class="container">
        <span class="eyebrow" data-i18n="aboutLabel"></span>
        <h2 class="section-title" data-i18n="aboutTitle"></h2>

        <div class="about-grid">
          <div id="about-text" class="prose"></div>
          <blockquote data-i18n="quote"></blockquote>
        </div>
      </div>
    </section>

    <section class="section" id="workflow">
      <div class="container">
        <span class="eyebrow" data-i18n="workflowLabel"></span>
        <h2 class="section-title" data-i18n="workflowTitle"></h2>
        <div class="workflow" id="workflow-grid"></div>
      </div>
    </section>

    <section class="section" id="experience">
      <div class="container">
        <span class="eyebrow" data-i18n="experienceLabel"></span>
        <h2 class="section-title" data-i18n="experienceTitle"></h2>
        <p class="section-intro" data-i18n="experienceIntro"></p>

        <div class="timeline-layout">
          <div class="timeline-list" id="timeline-list"></div>
          <article class="timeline-detail" id="timeline-detail" aria-live="polite"></article>
        </div>
      </div>
    </section>

    <section class="section" id="skills">
      <div class="container">
        <span class="eyebrow" data-i18n="skillsLabel"></span>
        <h2 class="section-title" data-i18n="skillsTitle"></h2>
        <div class="cards-grid" id="skills-grid"></div>
      </div>
    </section>

    <section class="section" id="projects">
      <div class="container">
        <div class="section-heading-row">
          <div>
            <span class="eyebrow" data-i18n="projectsLabel"></span>
            <h2 class="section-title" data-i18n="projectsTitle"></h2>
          </div>

          <div class="carousel-controls">
            <button class="carousel-button" id="cases-prev" type="button">←</button>
            <button class="carousel-button" id="cases-next" type="button">→</button>
          </div>
        </div>

        <div class="cases-carousel" id="cases-carousel">
          <div class="cases-track" id="projects-track"></div>
        </div>
        <div class="carousel-dots" id="carousel-dots"></div>
      </div>
    </section>

    <section class="section contact" id="contact">
      <div class="container contact__inner">
        <div>
          <span class="eyebrow" data-i18n="contactLabel"></span>
          <h2 class="section-title" data-i18n="contactTitle"></h2>
          <p data-i18n="contactText"></p>
        </div>

        <div class="contact__links">
          <a id="contact-telegram" class="button button--telegram" target="_blank" rel="noopener noreferrer" data-i18n="telegram"></a>
          <button id="copy-email" class="button button--primary" type="button" data-i18n="email"></button>
          <a id="contact-phone" class="button button--secondary" data-i18n="phone"></a>
        </div>
      </div>
    </section>
  </main>

  <button class="back-to-top" id="back-to-top" type="button">
    <span aria-hidden="true">↑</span>
    <span data-i18n="backToTop"></span>
  </button>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <footer class="site-footer">
    <div class="container">© <span id="year"></span> <span id="footer-name"></span></div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
